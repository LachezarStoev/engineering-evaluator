<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="430" viewBox="0 0 1200 430" role="img" aria-labelledby="title description">
  <title id="title">Engineering evaluation pipeline</title>
  <desc id="description">Evidence flows from Jira, GitLab and Confluence through deterministic calculation, AI explanation and human review.</desc>
  <defs>
    <linearGradient id="background" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f7faf8"/>
      <stop offset="1" stop-color="#eef5f1"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-30%" width="140%" height="160%">
      <feDropShadow dx="0" dy="5" stdDeviation="6" flood-color="#153f35" flood-opacity=".12"/>
    </filter>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0 0L10 5L0 10Z" fill="#55756c"/>
    </marker>
    <style>
      .stage { font: 700 15px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; letter-spacing: 1.5px; fill: #55756c; }
      .title { font: 700 17px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #102821; }
      .detail { font: 500 13px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #557068; }
      .arrow { fill: none; stroke: #55756c; stroke-width: 2.5; marker-end: url(#arrow); }
    </style>
  </defs>

  <rect width="1200" height="430" rx="24" fill="url(#background)"/>
  <text class="stage" x="50" y="46">COLLECT</text>
  <text class="stage" x="50" y="244">CALCULATE &amp; REVIEW</text>

  <g filter="url(#shadow)">
    <rect x="50" y="70" width="250" height="112" rx="16" fill="#ffffff" stroke="#c9d9d3"/>
    <circle cx="82" cy="102" r="16" fill="#d8ff67"/>
    <text class="title" x="108" y="108">Source systems</text>
    <text class="detail" x="74" y="143">Jira · GitLab · Confluence</text>

    <rect x="355" y="70" width="220" height="112" rx="16" fill="#ffffff" stroke="#c9d9d3"/>
    <circle cx="387" cy="102" r="16" fill="#d8ff67"/>
    <text class="title" x="413" y="108">Read-only sync</text>
    <text class="detail" x="379" y="143">Global, paginated collection</text>

    <rect x="630" y="70" width="220" height="112" rx="16" fill="#ffffff" stroke="#c9d9d3"/>
    <circle cx="662" cy="102" r="16" fill="#d8ff67"/>
    <text class="title" x="688" y="108">Evidence</text>
    <text class="detail" x="654" y="143">Normalized · deduplicated</text>

    <rect x="905" y="70" width="245" height="112" rx="16" fill="#153f35"/>
    <circle cx="937" cy="102" r="16" fill="#d8ff67"/>
    <text x="963" y="108" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="17" font-weight="700" fill="#ffffff">Deterministic rules</text>
    <text x="929" y="143" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="13" font-weight="500" fill="#d4e5df">Versioned formulas and criteria</text>

    <rect x="50" y="268" width="250" height="112" rx="16" fill="#ffffff" stroke="#c9d9d3"/>
    <circle cx="82" cy="300" r="16" fill="#d8ff67"/>
    <text class="title" x="108" y="306">Transparent results</text>
    <text class="detail" x="74" y="341">Metrics · coverage · links</text>

    <rect x="355" y="268" width="220" height="112" rx="16" fill="#ffffff" stroke="#c9d9d3"/>
    <circle cx="387" cy="300" r="16" fill="#d8ff67"/>
    <text class="title" x="413" y="306">AI explanation</text>
    <text class="detail" x="379" y="341">Advisory summary only</text>

    <rect x="630" y="268" width="220" height="112" rx="16" fill="#ffffff" stroke="#c9d9d3"/>
    <circle cx="662" cy="300" r="16" fill="#d8ff67"/>
    <text class="title" x="688" y="306">Developer review</text>
    <text class="detail" x="654" y="341">Verify evidence or dispute</text>

    <rect x="905" y="268" width="245" height="112" rx="16" fill="#d8ff67" stroke="#a8d52e"/>
    <circle cx="937" cy="300" r="16" fill="#153f35"/>
    <text class="title" x="963" y="306">Manager decision</text>
    <text class="detail" x="929" y="341">Reason · finalize · export</text>
  </g>

  <path class="arrow" d="M300 126H347"/>
  <path class="arrow" d="M575 126H622"/>
  <path class="arrow" d="M850 126H897"/>
  <path class="arrow" d="M1028 182V218H175V260"/>
  <path class="arrow" d="M300 324H347"/>
  <path class="arrow" d="M575 324H622"/>
  <path class="arrow" d="M850 324H897"/>
</svg>
